<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Stackly</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <main class="not-found-page">
    <section class="not-found-card" aria-labelledby="notFoundTitle">
      <a class="brand" href="index.html" aria-label="Stackly home">
        <span class="brand-mark">S</span>
        <span>STACKLY</span>
      </a>
      <strong>404</strong>
      <h1 id="notFoundTitle">Page Not Found</h1>
      <p>This page is not available right now. You can go back to the previous page or return to the home page.</p>
      <div class="not-found-actions">
        <button type="button" onclick="if (history.length > 1) { history.back(); } else { window.location.href='index.html'; }">Go Back</button>
        <a href="index.html">Back to Home</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
